name: Update Post Status

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Post ID to update"
        required: true
        type: number
      status:
        description: "New status"
        required: true
        type: choice
        options: [deleted, pending, posted, failed]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci

      - name: Update post status in DB
        run: |
          node src/db.js update ${{ inputs.post_id }} '{"status":"${{ inputs.status }}"}'
        env:
          NODE_ENV: production

      - name: Commit updated DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.db
          git diff --staged --quiet || git commit -m "chore: update post ${{ inputs.post_id }} status → ${{ inputs.status }}"
          git push
